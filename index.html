<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: rgb(228, 196, 196);
            width: 350px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(153, 113, 113, 0.2);
        }

        h1 {
            text-align: center;
            color: #f03333;
        }

        .data {
            margin-top: 20px;
        }

        .data p {
            font-size: 18px;
            margin: 12px 0;
        }

        .label {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Biodata</h1>

        <div class="data">
            <p><span class="label">Nama :</span> Harvi Henokh Loupatty</p>
            <p><span class="label">Umur :</span> 21 Tahun</p>
            <p><span class="label">Tanggal/Bulan Lahir :</span> 21 Februari</p>
            <p><span class="label">Tahun Lahir :</span> 2005</p>
            <p><span class="label">Pekerjaan :</span> Mahasiswa</p>
        </div>
    </div>

</body>
</html>
